<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StriderX‑XY - Produit</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="container nav-container">
    <div class="logo">StriderX‑XY</div>
    <nav>
        <ul class="nav-menu">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="catalogue.html">Catalogue</a></li>
            <li><a href="cart.html">Panier</a></li>
        </ul>
    </nav>
    <div class="menu-toggle">&#9776;</div>
</div>
</header>

<section class="product-detail">
    <div class="product-images">
        <img id="main-img" src="images/shoe1.jpg" alt="Produit">
        <div class="thumbs">
            <img src="images/shoe1.jpg" class="thumb active">
            <img src="images/shoe1-2.jpg" class="thumb">
            <img src="images/shoe1-3.jpg" class="thumb">
        </div>
    </div>
    <div class="product-info">
        <h1 id="product-name">Air Runner X1</h1>
        <p class="price" id="product-price">150€</p>
        <p class="description" id="product-desc">
            Chaussure légère et confortable pour la course et les entraînements.
        </p>
        <label for="size">Taille :</label>
        <select id="size">
            <option value="38">38</option>
            <option value="39">39</option>
            <option value="40">40</option>
            <option value="41">41</option>
            <option value="42">42</option>
        </select>
        <button class="btn-primary" id="add-to-cart">Ajouter au panier</button>
    </div>
</section>

<footer>
<div class="footer-container">
    <div class="footer-logo">StriderX‑XY</div>
    <p>&copy; 2026 StriderX‑XY. Tous droits réservés.</p>
    <div class="social-icons">
        <a href="#"><img src="images/facebook.svg" alt="Facebook"></a>
        <a href="#"><img src="images/instagram.svg" alt="Instagram"></a>
        <a href="#"><img src="images/twitter.svg" alt="Twitter"></a>
    </div>
</div>
</footer>

<script src="script.js"></script>
</body>
</html>
